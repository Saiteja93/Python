{% extends 'layout.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">Edit Task</h4>
                    <button id="deleteButton" class="btn btn-danger btn-sm">Delete Task</button>
                </div>

                <div class="card-body">
                    <form id="editTodoForm">
                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" name="title" class="form-control" id="title" value="{{ todo.title }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea name="description" class="form-control" id="description" rows="3" required>{{ todo.description }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label for="priority" class="form-label">Priority</label>
                            <select name="priority" class="form-select" id="priority">
                                <option value="1" {% if todo.priority == 1 %}selected{% endif %}>1 (Lowest)</option>
                                <option value="2" {% if todo.priority == 2 %}selected{% endif %}>2</option>
                                <option value="3" {% if todo.priority == 3 %}selected{% endif %}>3</option>
                                <option value="4" {% if todo.priority == 4 %}selected{% endif %}>4</option>
                                <option value="5" {% if todo.priority == 5 %}selected{% endif %}>5 (Highest)</option>
                            </select>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" name="complete" class="form-check-input" id="complete" {% if todo.complete %}checked{% endif %}>
                            <label class="form-check-label" for="complete">Mark as Completed</label>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <a href="/todos/todo-page" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
