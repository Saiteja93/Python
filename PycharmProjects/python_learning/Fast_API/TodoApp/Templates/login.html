
{% extends 'layout.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card col-md-6 offset-md-3"> <div class="card-header text-center font-weight-bold">
            Login
        </div>
        <div class="card-body">
            <form id="loginForm" >
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" name="username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" name="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
        </div>
        <div class="card-footer text-muted text-center">
            Don't have an account? <a href="/auth/register-page">Register</a>
        </div>
    </div>
</div>
{% endblock %}
