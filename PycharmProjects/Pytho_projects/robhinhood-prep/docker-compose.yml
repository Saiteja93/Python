services:
  fastapi:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      - postgres
      - redis
    env_file:
      - .env.docker
    restart: on-failure

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"

  postgres:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: brokerage
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.0
    ports:
      - "6379:6379"

volumes:
  postgres_data: